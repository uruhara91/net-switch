<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="styles/index.css" type="text/css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <script type="module" src="scripts/index.js" type="text/javascript"></script>
    <script type="module" src="scripts/mmrl.js" type="text/javascript"></script>
  </head>

  <body class="root_layout min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 text-gray-800 dark:from-gray-900 dark:to-gray-800 dark:text-gray-200">
    <!-- Header -->
    <div class="border-b border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-800">
      <div class="px-4 py-3">
        <div class="flex items-center space-x-2">
          <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-blue-500 to-purple-600">
            <i class="fas fa-network-wired text-sm text-white"></i>
          </div>
          <div>
            <h1 id="ns-title" class="bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-lg font-bold text-transparent">Net Switch</h1>
            <p id="ns-subtitle" class="text-xs text-gray-500 dark:text-gray-400">Gestione Isolamento App</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Profiles Section -->
    <div class="mx-3 mt-4 rounded-xl border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-800">
      <div class="p-4">
        <div class="mb-4 flex items-center space-x-2">
          <div class="flex h-6 w-6 items-center justify-center rounded-md bg-gradient-to-br from-green-500 to-emerald-600">
            <i class="fas fa-user-cog text-xs text-white"></i>
          </div>
          <h2 id="ns-profiles-title" class="text-lg font-semibold text-gray-800 dark:text-gray-200">Gestione Profili</h2>
        </div>

        <div class="space-y-3">
          <!-- Profile Management -->
          <div class="rounded-lg bg-gray-50 p-3 dark:bg-gray-700">
            <div class="flex items-center space-x-2">
              <div class="relative flex-grow">
                <i class="fas fa-users absolute top-1/2 left-2 -translate-y-1/2 transform text-xs text-gray-400"></i>
                <select id="profile-select" class="w-full rounded-lg border border-gray-300 py-2 pr-3 pl-7 text-sm transition-all duration-200 focus:border-transparent focus:ring-1 focus:ring-blue-500 focus:outline-none dark:border-gray-600 dark:bg-gray-800 dark:text-gray-200">
                  <option value="" id="ns-select-profile">Seleziona Profilo</option>
                </select>
              </div>

              <button id="delete-profile" title="Elimina il profilo selezionato dal menu a tendina, oppure il profilo attualmente attivo" class="rounded-lg bg-gradient-to-r from-red-500 to-red-600 px-3 py-2 text-sm whitespace-nowrap text-white shadow-md transition-all duration-200 hover:from-red-600 hover:to-red-700 focus:ring-1 focus:ring-red-500 focus:outline-none">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>

          <!-- New Profile Creation -->
          <div class="rounded-lg border border-purple-200 bg-gradient-to-r from-purple-50 to-pink-50 p-3 dark:border-gray-600 dark:from-gray-700 dark:to-gray-600">
            <div class="flex space-x-2">
              <div class="relative flex-1">
                <i class="fas fa-plus-circle absolute top-1/2 left-2 -translate-y-1/2 transform text-xs text-gray-400"></i>
                <input type="text" id="new-profile-name" placeholder="Nome nuovo profilo" class="w-full rounded-lg border border-gray-300 py-2 pr-3 pl-7 text-sm transition-all duration-200 focus:border-transparent focus:ring-1 focus:ring-purple-500 focus:outline-none dark:border-gray-600 dark:bg-gray-800 dark:text-gray-200" />
              </div>
              <button id="create-profile" class="rounded-lg bg-gradient-to-r from-purple-500 to-pink-600 px-3 py-2 text-sm whitespace-nowrap text-white shadow-md transition-all duration-200 hover:from-purple-600 hover:to-pink-700 focus:ring-1 focus:ring-purple-500 focus:outline-none"><i class="fas fa-magic mr-1 text-xs"></i><span id="ns-create">Crea</span></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Search Section -->
    <div class="mx-3 mt-4 rounded-xl border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-800">
      <div class="p-4">
          <div class="mb-3 flex items-center space-x-2">
          <div class="flex h-6 w-6 items-center justify-center rounded-md bg-gradient-to-br from-yellow-500 to-orange-600">
            <i class="fas fa-search text-xs text-white"></i>
          </div>
          <h2 id="ns-search-title" class="text-lg font-semibold text-gray-800 dark:text-gray-200">Cerca App</h2>
        </div>

        <div class="relative">
          <i class="fas fa-search absolute top-1/2 left-3 -translate-y-1/2 transform text-xs text-gray-400"></i>
          <input type="search" id="search" placeholder="Cerca app per nome..." class="w-full rounded-lg border border-gray-300 py-2 pr-3 pl-8 text-sm transition-all duration-200 focus:border-transparent focus:ring-1 focus:ring-yellow-500 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200" />
        </div>
      </div>
    </div>

    <!-- Apps List -->
    <div class="mx-3 mt-4 mb-6">
      <div class="rounded-xl border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-800">
        <div class="p-4">
            <div class="mb-4 flex items-center space-x-2">
            <div class="flex h-6 w-6 items-center justify-center rounded-md bg-gradient-to-br from-indigo-500 to-purple-600">
              <i class="fas fa-mobile-alt text-xs text-white"></i>
            </div>
            <h2 id="ns-apps-title" class="text-lg font-semibold text-gray-800 dark:text-gray-200">Lista Applicazioni</h2>
          </div>
          <div id="apps-list" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- App Template -->
    <template id="app-template">
      <div class="group rounded-lg border border-gray-200 bg-gradient-to-r from-white to-gray-50 p-3 shadow-sm transition-all duration-200 hover:shadow-md dark:border-gray-600 dark:from-gray-700 dark:to-gray-800">
        <div class="flex items-center justify-between">
          <!-- App info -->
          <div class="flex min-w-0 flex-1 items-center space-x-3">
            <!-- App icon -->
            <div class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-blue-400 to-purple-500 shadow-md">
              <i class="fas fa-mobile-alt text-xs text-white"></i>
            </div>

            <!-- App name and status -->
            <div class="min-w-0 flex-1">
              <p class="truncate text-sm font-medium text-gray-800 dark:text-gray-200"></p>
              <p class="mt-0.5 text-xs text-gray-500 dark:text-gray-400">
                <span class="app-status">📡 Connesso</span>
              </p>
            </div>
          </div>

          <!-- Compact Switch -->
          <div class="flex flex-shrink-0 items-center space-x-2">
            <div class="hidden text-right sm:block">
              <div class="switch-label text-xs text-gray-500 dark:text-gray-400">Connesso</div>
            </div>

            <label class="switch-enhanced">
              <input type="checkbox" class="ns-toggle" />
              <span class="slider" aria-hidden="true"></span>
            </label>
          </div>
        </div>
      </div>
    </template>

    <!-- Loading Spinner (hidden by default) -->
    <div id="loading-spinner" class="bg-opacity-50 fixed inset-0 z-50 hidden items-center justify-center bg-black">
      <div class="rounded-xl bg-white p-6 shadow-2xl dark:bg-gray-800">
        <div class="flex items-center space-x-3">
          <div class="h-6 w-6 animate-spin rounded-full border-b-2 border-blue-600"></div>
          <div class="text-base font-medium text-gray-800 dark:text-gray-200">Caricamento...</div>
        </div>
      </div>
    </div>

    <!-- Success Toast -->
    <div id="success-toast" class="toast-hidden fixed top-4 right-4 z-50 translate-x-full transform rounded-lg bg-green-500 px-4 py-2 text-white shadow-lg transition-transform duration-300">
      <div class="flex items-center space-x-2">
        <i class="fas fa-check-circle text-sm"></i>
        <span id="success-message" class="text-sm">Operazione completata!</span>
      </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="toast-hidden fixed top-4 right-4 z-50 translate-x-full transform rounded-lg bg-red-500 px-4 py-2 text-white shadow-lg transition-transform duration-300">
      <div class="flex items-center space-x-2">
        <i class="fas fa-exclamation-circle text-sm"></i>
        <span id="error-message" class="text-sm">Errore nell'operazione!</span>
      </div>
    </div>
  </body>
</html>
